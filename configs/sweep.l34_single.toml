# L3 + L4, both variants, single-turn (no tools).
# The agent gets exactly one shot to call submit_kernel.
#
# Coverage:
#   L3 original: 50,  L3 popcorn: 14
#   L4 original: 20,  L4 popcorn: 31
#   = 115 problems x 2 models = 230 work items.
#
# num_perf_trials reduced from 100 -> 20 because L3/L4 reference forwards
# can be 1-30s; 100 trials would push submit_kernel past the worker
# timeout on the slowest problems.
#
#   uv run python scripts/run_sweep.py configs/sweep.l34_single.toml

[run]
name              = "l34_single"
dataset_src       = "local"
variants          = ["original", "popcorn"]
levels            = [3, 4]
problem_subset    = []
backend           = "cuda"
precision         = "fp32"
gpu_arch          = ["Hopper"]
timing_method     = "cuda_event"
num_correct_trials = 3
num_perf_trials   = 20
tools             = "submit_kernel"

[agent]
max_turns          = 1
max_tool_calls     = 1
warn_turns_remaining = 0
reasoning_effort   = "medium"

[parallelism]
num_gpu_devices    = 8
agents_per_gpu     = 4
use_eval_queue     = true
worker_timeout_s   = 3600
eval_rpc_timeout_s = 3600

[report]
enabled            = true
refresh_seconds    = 60
serve              = true
serve_host         = "0.0.0.0"
serve_port         = 8765

[[models]]
name               = "gpt-5.5-priority"
api_kind           = "openai"
base_url           = "https://popcorn-centralus-resource.services.ai.azure.com/openai/v1/"
api_key_env        = "POPCORN_CENTRAL_AZURE_KEY"
rpm                = 250
tpm                = 250000
reasoning_effort   = "medium"

[[models]]
name               = "Kimi-K2.6"
api_kind           = "openai_chat"
base_url           = "https://thava-openai.services.ai.azure.com/models"
api_key_env        = "THAVA_AZURE_KEY"
rpm                = 250
tpm                = 250000
