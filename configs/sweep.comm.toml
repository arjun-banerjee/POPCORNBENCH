# Multi-GPU communication kernels — runs the L2 popcorn problems that
# require real torch.distributed primitives (all_reduce, broadcast,
# all_gather, reduce_scatter, all_to_all, p2p).
#
# These cannot be evaluated by the broad sweeps (sweep.full.toml et al.)
# because each agent worker pins CUDA_VISIBLE_DEVICES to a single GPU and
# torch.distributed.init_process_group then has no peer ranks to talk to.
# This config sets [parallelism].multi_gpu = true, which:
#   1. Disables the per-GPU pin so the worker sees all 8 GPUs.
#   2. Disables the FIFO eval queue (servers pin to one GPU each, so we
#      fall back to the local lock path).
#   3. Forces num_gpu_devices = 1 and agents_per_gpu = 1 — only one work
#      item runs at a time across the whole machine.
#
# Coverage:
#   L2/popcorn: 2_all_reduce_data_parallel, 11_broadcast_parameter_shard,
#               18_all_gather_tensor_parallel, 27_reduce_scatter_grad_shard,
#               34_all_to_all_permutation, 38_pipeline_stage_p2p.
#   = 6 problems x 2 models = 12 work items.
#
# Wall-clock estimate: ~5-15 min/problem (depends on backbone size). With
# strict serialization across the whole box, ~3-6 hours total.
#
#   uv run python scripts/run_sweep.py configs/sweep.comm.toml

[run]
name              = "comm_l2_popcorn"
dataset_src       = "local"
variants          = ["popcorn"]
levels            = [2]
problem_subset    = []          # the multi-GPU filter handles selection
backend           = "cuda"
precision         = "fp32"
gpu_arch          = ["Hopper"]
timing_method     = "cuda_event"
num_correct_trials = 3
num_perf_trials   = 20
tools             = "default"

[agent]
max_turns          = 8
max_tool_calls     = 24
reasoning_effort   = "medium"

[parallelism]
multi_gpu          = true
num_gpu_devices    = 1
agents_per_gpu     = 1
perf_lock_per_gpu  = false
worker_timeout_s   = 5400

[report]
enabled            = true
refresh_seconds    = 60
serve              = true
serve_host         = "0.0.0.0"
serve_port         = 8765

[[models]]
name               = "gpt-5.5"
api_kind           = "openai"
base_url           = "https://tejas-mohrgcfh-eastus2.cognitiveservices.azure.com/openai/v1/"
api_key_env        = "POPCORN_CENTRAL_AZURE_KEY"
rpm                = 250
tpm                = 250000
reasoning_effort   = "medium"

[[models]]
name               = "Kimi-K2.6"
api_kind           = "openai_chat"
base_url           = "https://thava-openai.services.ai.azure.com/models"
api_key_env        = "THAVA_AZURE_KEY"
rpm                = 250
tpm                = 250000
