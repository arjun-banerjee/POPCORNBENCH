# Full sweep for L3 + L4 — the heavy levels.
#
# Differs from sweep.full.toml in three ways:
#   1. num_perf_trials = 20 (vs 100). L4 references can be 5-30s; 100 trials
#      means submit_kernel takes 30-100 minutes per call. 20 trials still
#      gives <5% timing noise on Hopper but cuts that to a tractable 6-20 min.
#   2. agents_per_gpu = 1. L3/L4 evals are slow enough that oversubscribing
#      a GPU just produces lock contention; single-agent-per-GPU keeps the
#      submit_kernel queue depth at 1.
#   3. worker_timeout_s = 5400 (90 min). L4 with multiple turns of
#      submit_kernel can legitimately push past the 30 min default.
#
# Work items:
#   L3: 50 (orig) + 14 (popcorn) = 64
#   L4: 20 (orig) + 31 (popcorn) = 51
#   = 115 problems × 2 models    = 230 work items
#
# Wall-clock estimate on 8×H100 with 8 workers (1 per GPU):
#   ~20-40 min/problem; 460/8 × 30 min ≈ 28 hours.
#
# Run sweep.full.toml first (overnight), then this (next day).
# Resumable across restarts.

[run]
name              = "full_l34"
dataset_src       = "local"
variants          = ["original", "popcorn"]
levels            = [3, 4]
problem_subset    = []
backend           = "cuda"
precision         = "fp32"
gpu_arch          = ["Hopper"]
timing_method     = "cuda_event"
num_correct_trials = 3
num_perf_trials   = 20
tools             = "default"

[agent]
max_turns          = 8
max_tool_calls     = 24
reasoning_effort   = "medium"

[parallelism]
num_gpu_devices    = 8
# With the FIFO eval queue, agents don't hold the GPU during submit_kernel
# (multi-second perf trials on L3/L4 references). Even on heavy levels we
# can oversubscribe LLM-bound agents safely.
agents_per_gpu     = 4
use_eval_queue     = true
worker_timeout_s   = 5400
eval_rpc_timeout_s = 5400

[report]
enabled            = true
refresh_seconds    = 60
serve              = true
serve_host         = "0.0.0.0"
serve_port         = 8765

[[models]]
name               = "gpt-5.5"
api_kind           = "openai"
base_url           = "https://tejas-mohrgcfh-eastus2.cognitiveservices.azure.com/openai/v1/"
api_key_env        = "POPCORN_CENTRAL_AZURE_KEY"
rpm                = 250
tpm                = 250000
reasoning_effort   = "medium"

[[models]]
name               = "Kimi-K2.6"
api_kind           = "openai_chat"
base_url           = "https://thava-openai.services.ai.azure.com/models"
api_key_env        = "THAVA_AZURE_KEY"
rpm                = 250
tpm                = 250000
