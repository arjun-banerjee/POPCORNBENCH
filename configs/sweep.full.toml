# Full cross-domain sweep — L1 + L2, both variants, every non-AlphaEvolve
# model. Uses 100 perf trials per submit_kernel because L1/L2 reference
# runtimes are short enough to make that affordable.
#
# Pair this with sweep.full_heavy.toml for L3 + L4 (separate run because
# those levels need fewer perf trials and lower per-GPU concurrency to
# avoid worker timeouts).
#
# Work items:
#   L1: 100 (orig) + 34 (popcorn) = 134
#   L2: 100 (orig) + 51 (popcorn) = 151
#   = 285 problems × 2 models     = 570 work items
#
# Wall-clock estimate on 8×H100 with 24 workers:
#   ~5-10 min/problem; 1140/24 × 7 min ≈ 5-6 hours.
#
# Resumable: rerun the same TOML and existing trajectories are skipped.
#
#   uv run python scripts/run_sweep.py configs/sweep.full.toml

[run]
name              = "full_l12"
dataset_src       = "local"
variants          = ["original", "popcorn"]
levels            = [1, 2]
problem_subset    = []              # all problems
backend           = "cuda"
precision         = "fp32"
gpu_arch          = ["Hopper"]
timing_method     = "cuda_event"
num_correct_trials = 5
num_perf_trials   = 100
tools             = "default"

[agent]
max_turns          = 10
max_tool_calls     = 30
reasoning_effort   = "medium"

[parallelism]
num_gpu_devices    = 8
# With the FIFO eval queue, agents don't hold the GPU while submit_kernel
# runs — they push to the queue and immediately go back to making LLM
# calls on the next turn. So we can oversubscribe much more aggressively.
agents_per_gpu     = 6
use_eval_queue     = true
worker_timeout_s   = 3600
# Per-RPC eval timeout for submit_kernel (much longer than typical eval
# wall-clock so a long tail doesn't crash the agent).
eval_rpc_timeout_s = 3600

[report]
enabled            = true
refresh_seconds    = 60             # busier sweep; ease off the report rebuilds
serve              = true
serve_host         = "0.0.0.0"
serve_port         = 8765

[[models]]
name               = "gpt-5.5"
api_kind           = "openai"
base_url           = "https://tejas-mohrgcfh-eastus2.cognitiveservices.azure.com/openai/v1/"
api_key_env        = "TEJAS_AZURE_KEY"
rpm                = 250
tpm                = 250000
reasoning_effort   = "medium"

[[models]]
name               = "Kimi-K2.6"
api_kind           = "openai_chat"
base_url           = "https://thava-openai.services.ai.azure.com/models"
api_key_env        = "THAVA_AZURE_KEY"
rpm                = 250
tpm                = 250000
