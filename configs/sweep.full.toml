# Full cross-domain sweep — every problem in every level, both variants,
# every non-AlphaEvolve model. This is the dataset that backs the
# "models degrade off textbook ops" headline figure.
#
# Total work items:
#   L1: 100 (orig) + 34 (popcorn) =  134
#   L2: 100 (orig) + 51 (popcorn) =  151
#   L3:  50 (orig) + 14 (popcorn) =   64
#   L4:  20 (orig) + 31 (popcorn) =   51
#   = 400 problems × 4 models     = 1600 work items
#
# Wall-clock estimate on 8×H100 with 24 workers:
#   typical 5-15 min/problem (L4 fwd passes are at the upper end)
#   1600/24 × 10 min ≈ 11 hours. Run it overnight.
#
# Resumable: if you stop and restart, completed trajectories on disk are
# skipped, so partial reruns just fill in the gaps.
#
#   uv run python scripts/run_sweep.py configs/sweep.full.toml

[run]
name              = "full_all_levels"
dataset_src       = "local"
variants          = ["original", "popcorn"]
levels            = [1, 2, 3, 4]
problem_subset    = []              # all problems
backend           = "cuda"
precision         = "fp32"
gpu_arch          = ["Hopper"]
timing_method     = "cuda_event"
num_correct_trials = 5
num_perf_trials   = 100
tools             = "default"

[agent]
max_turns          = 10
max_tool_calls     = 30
reasoning_effort   = "medium"

[parallelism]
num_gpu_devices    = 8
agents_per_gpu     = 3
perf_lock_per_gpu  = true
# L4 problems can run multi-second forward passes; bump worker timeout from
# the 1800s default to give the agent enough turns to finish.
worker_timeout_s   = 3600

[report]
enabled            = true
refresh_seconds    = 60             # busier sweep; ease off the report rebuilds
serve              = true
serve_host         = "0.0.0.0"
serve_port         = 8765

[[models]]
name               = "gpt-5.5"
api_kind           = "openai"
base_url           = "https://tejas-mohrgcfh-eastus2.cognitiveservices.azure.com/openai/v1/"
api_key_env        = "TEJAS_AZURE_KEY"
rpm                = 250
tpm                = 250000
reasoning_effort   = "medium"

[[models]]
name               = "FW-GLM-5-1"
api_kind           = "openai_chat"
base_url           = "https://popcorn-foundry-resource.openai.azure.com/openai/v1/"
api_key_env        = "POPCORN_AZURE_KEY"
rpm                = 250
tpm                = 250000

