# L1 + L2, both variants, multi-turn with the default tool set.
# tools = "default" includes compile_kernel, run_correctness,
# get_gpu_specs, static_check, submit_kernel. Profile / disassemble /
# ert are excluded.
#
# Coverage:
#   L1 original: 100, L1 popcorn: 34
#   L2 original: 100, L2 popcorn: 45 (drops the 6 multi-GPU comm kernels)
#   = 279 problems x 2 models = 558 work items.
#
#   uv run python scripts/run_sweep.py configs/sweep.l12_default.toml

[run]
name              = "l12_default"
dataset_src       = "local"
variants          = ["original", "popcorn"]
levels            = [1, 2]
problem_subset    = []
backend           = "cuda"
precision         = "fp32"
gpu_arch          = ["Hopper"]
timing_method     = "cuda_event"
num_correct_trials = 5
num_perf_trials   = 100
tools             = "default"

[agent]
max_turns          = 10
max_tool_calls     = 30
reasoning_effort   = "medium"

[parallelism]
num_gpu_devices    = 8
agents_per_gpu     = 6
use_eval_queue     = true
worker_timeout_s   = 3600
eval_rpc_timeout_s = 3600

[report]
enabled            = true
refresh_seconds    = 60
serve              = true
serve_host         = "0.0.0.0"
serve_port         = 8765

[[models]]
name               = "gpt-5.5-priority"
api_kind           = "openai"
base_url           = "https://popcorn-centralus-resource.services.ai.azure.com/openai/v1/"
api_key_env        = "POPCORN_CENTRAL_AZURE_KEY"
rpm                = 250
tpm                = 250000
reasoning_effort   = "medium"

[[models]]
name               = "Kimi-K2.6"
api_kind           = "openai_chat"
base_url           = "https://thava-openai.services.ai.azure.com/models"
api_key_env        = "THAVA_AZURE_KEY"
rpm                = 250
tpm                = 250000
