# Multi-turn sweep with the default tool set: compile_kernel, run_correctness,
# get_gpu_specs, static_check, submit_kernel.
#
# Excludes the opt-in tools: profile_kernel, disassemble_kernel, ert_roofline.
# Compare against multi_turn_all to measure the benefit of those heavier tools.
#
#   uv run python scripts/run_sweep.py configs/sweep.cuda_multi_turn_default.toml

[run]
name              = "cuda_l2pop_multi_turn_default"
runs_dir          = "runs"
dataset_src       = "local"
variants          = ["popcorn"]
levels            = [2]
problem_subset    = []
backend           = "cuda"
precision         = "fp32"
gpu_arch          = ["Hopper"]
timing_method     = "cuda_event"
num_correct_trials = 5
num_perf_trials    = 100
tools              = "default"   # excludes profile/disasm/ert (opt-in only)

[agent]
max_turns          = 10
max_tool_calls     = 30
warn_turns_remaining = 2
turn_delay_s       = 0.0
reasoning_effort   = "medium"

[parallelism]
num_gpu_devices    = 8
agents_per_gpu     = 1          # 8x1 = 8 workers (safer for L2/L3 + OOM-prone problems)
perf_lock_per_gpu  = true

[report]
enabled            = true
refresh_seconds    = 30
serve              = true
serve_host         = "0.0.0.0"
serve_port         = 8765

# ──────────────────────────────────────────────────────────────────────
# Models
# ──────────────────────────────────────────────────────────────────────

[[models]]
name               = "gpt-5.5"
api_kind           = "openai"
base_url           = "https://tejas-mohrgcfh-eastus2.cognitiveservices.azure.com/openai/v1/"
api_key_env        = "TEJAS_AZURE_KEY"
rpm                = 250
tpm                = 250000
reasoning_effort   = "medium"

