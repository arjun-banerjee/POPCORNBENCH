# AlphaEvolve on the original (KernelBench) variant of L1 + L2 — paired
# comparison against sweep.ae_focus.toml's popcorn run.
#
# Same problem IDs (1, 2, 10) so for each level you have an AE result on the
# textbook reference and on the popcorn reference. Lets us answer "does AE
# generalize, or is it just exploiting the slow popcorn refs?"
#
# L3 and L4 original are deliberately skipped: those problems are already
# well-covered convnet/transformer code where torch.compile is competitive,
# and AE wall-clock cost (30-60 min/problem) is hard to justify for an
# expected ~1x outcome.
#
# Prerequisite: aeproxy running on the same host.
#   cd /scratch/tejas/sp26-ae-llm && uv run python -m aeproxy.server
#
# Wall-clock estimate (single GPU, 2 server-side concurrent runs):
#   L1 original (~12 min/problem) x 3 problems ≈ 36 min
#   L2 original (~25 min/problem) x 3 problems ≈ 75 min
#   ≈ 1.5-2 hours total wall-clock with 2-way concurrency
#
#   uv run python scripts/run_sweep.py configs/sweep.ae_focus_orig.toml

[run]
name              = "ae_focus_original"
dataset_src       = "local"
variants          = ["original"]
levels            = [1, 2]
problem_subset    = [1, 2, 10]
backend           = "cuda"
precision         = "fp32"
gpu_arch          = ["Hopper"]
timing_method     = "cuda_event"
num_correct_trials = 3
num_perf_trials   = 20
tools             = "compile_kernel,run_correctness,submit_kernel"

[agent]
max_turns          = 2
max_tool_calls     = 4
reasoning_effort   = "medium"

[parallelism]
num_gpu_devices    = 1
agents_per_gpu     = 1
perf_lock_per_gpu  = true
worker_timeout_s   = 5400

[report]
enabled            = true
refresh_seconds    = 30
serve              = true
serve_host         = "0.0.0.0"
serve_port         = 8765

[[models]]
name              = "alphaevolve-gemini-3-mixture"
api_kind          = "openai_chat"
base_url          = "http://localhost:8765/v1/"
api_key_env       = "AEPROXY_API_KEY"
deployment_name   = "alphaevolve-gemini-3-mixture"
rpm               = 4
tpm               = 1000000
max_concurrency   = 2
request_timeout_s = 5400
