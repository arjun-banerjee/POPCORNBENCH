# AlphaEvolve focus run — popcorn variant only, hand-picked subset spanning
# all four levels. Goal: show whether evolutionary search beats single-shot
# on harder, off-textbook problems (the popcorn axis).
#
# Prerequisite: aeproxy must be running on the same host.
#   cd /scratch/tejas/sp26-ae-llm && uv run python -m aeproxy.server
#
# Wall-clock estimate (single GPU, 2 server-side concurrent runs):
#   L1 popcorn (~12 min/problem at max_programs=8) × 3 problems ≈ 18 min
#   L2 popcorn (~25 min)                            × 3 problems ≈ 38 min
#   L3 popcorn (~40 min)                            × 3 problems ≈ 60 min
#   L4 popcorn (~60 min, perf_trials reduced)       × 3 problems ≈ 90 min
#   ≈ 3.5 hours total (with 2-way concurrency, ≈2 hours wall-clock)
#
#   uv run python scripts/run_sweep.py configs/sweep.ae_focus.toml

[run]
name              = "ae_focus_popcorn"
dataset_src       = "local"
variants          = ["popcorn"]
levels            = [1, 2, 3, 4]
problem_subset    = [1, 2, 10]      # IDs that exist in every level's popcorn dir
                                    # (avoids Mixtral 8x7B at L4 p5 which won't fit)
backend           = "cuda"
precision         = "fp32"
gpu_arch          = ["Hopper"]
timing_method     = "cuda_event"
num_correct_trials = 3
# Lowered from 100 because each AE candidate gets timed end-to-end and L4
# popcorn problems have multi-second reference runtimes. Trades a bit of
# timing variance for a tractable wall-clock.
num_perf_trials   = 10
tools             = "compile_kernel,run_correctness,submit_kernel"

[agent]
# AE returns a single submit_kernel in one "turn" — no tool-using agent loop.
max_turns          = 2
max_tool_calls     = 4
reasoning_effort   = "medium"

[parallelism]
num_gpu_devices    = 1
agents_per_gpu     = 1
perf_lock_per_gpu  = true
# AE wall-clock per request can hit the upper estimate above on L4. 90 min
# leaves headroom for reference-runtime variance.
worker_timeout_s   = 5400

[report]
enabled            = true
refresh_seconds    = 30
serve              = true
serve_host         = "0.0.0.0"
serve_port         = 8765

# ---- AlphaEvolve ----------------------------------------------------------

[[models]]
name              = "alphaevolve-gemini-3-mixture"
api_kind          = "openai_chat"
base_url          = "http://localhost:8765/v1/"
api_key_env       = "AEPROXY_API_KEY"
deployment_name   = "alphaevolve-gemini-3-mixture"
rpm               = 4
tpm               = 1000000
max_concurrency   = 2               # match aeproxy MAX_CONCURRENT_RUNS
request_timeout_s = 5400
