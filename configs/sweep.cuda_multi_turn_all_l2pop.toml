# Multi-turn sweep with EVERY tool, including the opt-in heavy ones:
# profile_kernel (Nsight Compute), disassemble_kernel (cuobjdump/nvdisasm),
# and ert_roofline (empirical roofline micro-benchmarks).
#
# Higher max_turns + max_tool_calls so the agent can actually use the new
# diagnostic tools. profile_kernel runs ncu in a subprocess; perf_lock_per_gpu
# keeps device timing clean under oversubscription.
#
# Requires: nsight-python + ncu in PATH for profile_kernel; cuobjdump/nvdisasm
# (CUDA Toolkit) for disassemble_kernel. Tools that aren't available will
# fail gracefully and the agent will move on.
#
#   uv run python scripts/run_sweep.py configs/sweep.cuda_multi_turn_all.toml

[run]
name              = "cuda_l2pop_multi_turn_all"
runs_dir          = "runs"
dataset_src       = "local"
variants          = ["popcorn"]
levels            = [2]
problem_subset    = []
backend           = "cuda"
precision         = "fp32"
gpu_arch          = ["Hopper"]
timing_method     = "cuda_event"
num_correct_trials = 5
num_perf_trials    = 100
tools              = "all"       # every tool in the registry

[agent]
max_turns          = 15          # bumped — heavier tools chew turns
max_tool_calls     = 50
warn_turns_remaining = 3
turn_delay_s       = 0.0
reasoning_effort   = "medium"

[parallelism]
num_gpu_devices    = 8
agents_per_gpu     = 1           # 8x1 = 8 workers (profile_kernel is heavy + OOM-prone L2/L3)
perf_lock_per_gpu  = true
worker_timeout_s   = 2700     # soft timeout per work item (SIGALRM); kill+skip on hang

[report]
enabled            = true
refresh_seconds    = 30
serve              = true
serve_host         = "0.0.0.0"
serve_port         = 8765

# ──────────────────────────────────────────────────────────────────────
# Models
# ──────────────────────────────────────────────────────────────────────

[[models]]
name               = "gpt-5.5"
api_kind           = "openai"
base_url           = "https://popcorn-centralus-resource.services.ai.azure.com/api/projects/popcorn-centralus/openai/v1/"
api_key_env        = "POPCORN_CENTRAL_AZURE_KEY"
rpm                = 250
tpm                = 250000
reasoning_effort   = "medium"

