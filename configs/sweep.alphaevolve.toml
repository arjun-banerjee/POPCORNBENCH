# Smoke sweep that points PopcornBench at a locally running aeproxy server.
# Bring up the proxy first:
#   cd /scratch/sp26-ae-llm && uv run python -m aeproxy.server --port 8765
# Then run this sweep from PopcornBench:
#   uv run python scripts/run_sweep.py configs/sweep.alphaevolve.toml

[run]
name              = "alphaevolve_smoke_l1"
dataset_src       = "local"
variants          = ["original"]
levels            = [1]
problem_subset    = [1, 19, 23]
backend           = "cuda"
precision         = "fp32"
gpu_arch          = ["Hopper"]
timing_method     = "cuda_event"
num_correct_trials = 3
num_perf_trials   = 20
tools             = "compile_kernel,run_correctness,submit_kernel"

[agent]
max_turns          = 2
max_tool_calls     = 4
reasoning_effort   = "medium"

[parallelism]
num_gpu_devices    = 1
agents_per_gpu     = 1
perf_lock_per_gpu  = true

[report]
enabled            = true
refresh_seconds    = 30
serve              = true
serve_port         = 8766

[[models]]
name              = "alphaevolve-gemini-3-mixture"
api_kind          = "openai_chat"
base_url          = "http://localhost:8765/v1/"
api_key_env       = "AEPROXY_API_KEY"
deployment_name   = "alphaevolve-gemini-3-mixture"
rpm               = 4
tpm               = 1000000
max_concurrency   = 2
request_timeout_s = 2400
